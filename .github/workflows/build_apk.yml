name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Android project structure
        run: flutter create --platforms=android .

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
      - name: Ajustar compileSdk para 36
        run: find android -type f ( -name "build.gradle" -o -name "build.gradle.kts" ) -exec sed -i -E 's/(compileSdkVersion|compileSdk)[[:space:]=]+.*/compileSdk = 36/g' {} +
        run: flutter build apk --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: viral-cutter-apk
          path: build/app/outputs/flutter-apk/*.apk
